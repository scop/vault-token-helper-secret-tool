pre-commit:
  commands:
    dprint:
      run: >-
        wrun
        -url darwin/amd64=https://github.com/dprint/dprint/releases/download/0.45.1/dprint-x86_64-apple-darwin.zip#sha256-83cce6b82d8674dbdddaf911bc117f1c866aaa4712aa381e54ab9466526026aa
        -url darwin/arm64=https://github.com/dprint/dprint/releases/download/0.45.1/dprint-aarch64-apple-darwin.zip#sha256-be6e4bcf9aafeb4ef34f27385717004cc0dfd06f8bce8e67b18937b53285d436
        -url linux/amd64=https://github.com/dprint/dprint/releases/download/0.45.1/dprint-x86_64-unknown-linux-musl.zip#sha256-eaf2690b7414d11bc33fb2a81898f285748a7a6a7983f965b569e536fb67b815
        -url linux/arm64=https://github.com/dprint/dprint/releases/download/0.45.1/dprint-aarch64-unknown-linux-musl.zip#sha256-c05d839d1f187d68d55effc60add4e66afb373015a1d1126c310b5c8669a8563
        -url windows/amd64=https://github.com/dprint/dprint/releases/download/0.45.1/dprint-x86_64-pc-windows-msvc.zip#sha256-71fef42ad86017a50bee977836dfd387d8584d6a9c4c03354d62977eaa1f135b
        -archive-exe-path dprint
        --
        fmt
        --allow-no-files
        {staged_files}
        && git diff --exit-code {staged_files}
    shellcheck:
      glob: vault-token-helper-secret-tool
      run: >-
        wrun
        -url darwin/arm64=https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.darwin.aarch64.tar.xz#sha256-bbd2f14826328eee7679da7221f2bc3afb011f6a928b848c80c321f6046ddf81
        -url darwin/amd64=https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.darwin.x86_64.tar.xz#sha256-ef27684f23279d112d8ad84e0823642e43f838993bbb8c0963db9b58a90464c2
        -url linux/amd64=https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz#sha256-6c881ab0698e4e6ea235245f22832860544f17ba386442fe7e9d629f8cbedf87
        -url linux/arm64=https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.aarch64.tar.xz#sha256-324a7e89de8fa2aed0d0c28f3dab59cf84c6d74264022c00c22af665ed1a09bb
        -url windows/amd64=https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.zip#sha256-eb6cd53a54ea97a56540e9d296ce7e2fa68715aa507ff23574646c1e12b2e143
        -archive-exe-path windows/*=shellcheck.exe
        -archive-exe-path shellcheck-v0.10.0/shellcheck
        --
        --format=gcc
        {staged_files}
    shfmt:
      glob: vault-token-helper-secret-tool
      run: >-
        wrun
        -url darwin/amd64=https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_darwin_amd64#sha256-c0218b47a0301bb006f49fad85d2c08de23df303472834faf5639d04121320f8
        -url darwin/arm64=https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_darwin_arm64#sha256-1481240d2a90d4f0b530688d76d4f9117d17a756b6027cfa42b96f0707317f83
        -url linux/amd64=https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64#sha256-27b3c6f9d9592fc5b4856c341d1ff2c88856709b9e76469313642a1d7b558fe0
        -url linux/arm64=https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_arm64#sha256-27e1f69b0d57c584bcbf5c882b4c4f78ffcf945d0efef45c1fbfc6692213c7c3
        -url windows/amd64=https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_windows_amd64.exe#sha256-91230a6d2d4dbb52e9c0bb134acba526f7880bfd3dfd1ffdde66e9f393d7a646
        --
        --write --simplify
        {staged_files}
        && git diff --exit-code {staged_files}
